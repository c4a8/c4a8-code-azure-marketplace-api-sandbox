version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/src/AzureMarketplaceSandbox"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
      efcore:
        patterns:
          - "Microsoft.EntityFrameworkCore*"

  - package-ecosystem: "nuget"
    directory: "/tests/AzureMarketplaceSandbox.Tests"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      test-dependencies:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.*"
          - "coverlet.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 1
